  // ── Dynamic lighting ──────────────────────────────────────────────────────────
  function drawLighting() {
    const darkAlpha = [0, 0, 0.48, 0.65, 0.70, 0.74, 0.82][game.level] || 0;
    if (darkAlpha === 0) return;
    lightCtx.clearRect(0,0,W,H);
    lightCtx.fillStyle = `rgba(0,0,30,${darkAlpha})`;
    lightCtx.fillRect(0,0,W,H);
    lightCtx.globalCompositeOperation = "destination-out";
    function addLight(lx,ly,r,alpha=1) {
      const g=lightCtx.createRadialGradient(lx,ly,0,lx,ly,r);
      g.addColorStop(0,`rgba(255,255,255,${alpha})`);
      g.addColorStop(1,"rgba(0,0,0,0)");
      lightCtx.fillStyle=g;
      lightCtx.beginPath();lightCtx.arc(lx,ly,r,0,Math.PI*2);lightCtx.fill();
    }
    addLight(player.x+player.w/2, player.y+player.h/2, 190, 0.95);
    if (game.goal) addLight(game.goal.x+16, game.goal.y+12, 110, 0.75);
    for (const p of game.projectiles)      addLight(p.x, p.y, 85, 0.9);
    for (const p of game.enemyProjectiles) addLight(p.x, p.y, 85, 0.9);
    for (const e of game.enemies) {
      if (e.alive && !e.dying) {
        if (e.type==="boss") addLight(e.x+e.w/2, e.y+e.h/2, 130, 0.65);
        else addLight(e.x+e.w/2, e.y+e.h/2, 55, 0.3);
      }
    }
    lightCtx.globalCompositeOperation = "source-over";
    ctx.drawImage(lightCanvas,0,0);
  }

  // ── Draw world ────────────────────────────────────────────────────────────────
  function drawWorld() {
    ctx.save();
    if (game.shake.dur>0) ctx.translate((Math.random()*2-1)*game.shake.mag,(Math.random()*2-1)*game.shake.mag);

    drawBackground();

    const TH=[
      {b:"#3c4c1a",t:"#587830",h:"#6a9030",s:"#2a3c10",m:"rgba(40,80,10,0.38)"},
      {b:"#48586a",t:"#687888",h:"#788898",s:"#384858",m:"rgba(60,80,110,0.32)"},
      {b:"#3c2a48",t:"#503858",h:"#604868",s:"#2a1a38",m:"rgba(60,40,80,0.35)"},
      {b:"#1e1a10",t:"#2a2418",h:"#3a3428",s:"#100e08",m:"rgba(0,0,0,0.45)"},
      {b:"#2a3040",t:"#3a4860",h:"#4a5878",s:"#181e2a",m:"rgba(40,60,120,0.40)"},
      {b:"#2a0a08",t:"#421008",h:"#561410",s:"#1a0404",m:"rgba(120,20,0,0.40)"},
      {b:"#3a1208",t:"#5a1e0a",h:"#702812",s:"#280800",m:"rgba(140,40,0,0.35)"}
    ];
    const th=TH[game.level]||TH[0];
    for (const t of game.tiles) {
      ctx.fillStyle=th.b; ctx.fillRect(t.x,t.y,t.w,t.h);
      ctx.fillStyle=th.t; ctx.fillRect(t.x,t.y,t.w,10);
      ctx.fillStyle=th.h; ctx.fillRect(t.x,t.y,t.w,3);
      ctx.fillStyle=th.s; ctx.fillRect(t.x,t.y+t.h-5,t.w,5); ctx.fillRect(t.x,t.y,3,t.h);
      ctx.fillStyle=th.m; ctx.fillRect(t.x,t.y,t.w,4);
      const tc=Math.floor(t.x/TILE),tr=Math.floor(t.y/TILE),seed=(tc*31+tr*17)%100;
      if (game.level===0) {
        if (seed<50){ctx.fillStyle="#2a4010";ctx.fillRect(t.x+(seed%28)+4,t.y,2,4+(seed%4));}
        if (seed%8===0){ctx.fillStyle="#3a5818";ctx.fillRect(t.x+(seed%30)+4,t.y+8,3,7);}
      } else if (game.level===1) {
        if (seed<55){ctx.fillStyle="#303848";ctx.fillRect(t.x+(seed%28)+8,t.y+6,1,8+(seed%6));}
        if (seed%9===0){ctx.fillStyle="#283040";ctx.fillRect(t.x+(seed%32)+2,t.y+4,3,1);ctx.fillRect(t.x+(seed%32)+3,t.y+5,5,1);}
      } else if (game.level===2) {
        if (seed<60){ctx.fillStyle="#201630";ctx.fillRect(t.x+(seed%28)+8,t.y+8,1,10+(seed%8));if(seed%2===0)ctx.fillRect(t.x+(seed%28)+10,t.y+14,1,5);}
      } else if (game.level===3) {
        if (seed<45){ctx.fillStyle="#181210";ctx.fillRect(t.x+(seed%30)+4,t.y+t.h-(3+seed%7),2,3+seed%7);}
        if (seed%7===0){ctx.fillStyle="#201a14";ctx.fillRect(t.x+(seed%28)+6,t.y+t.h-12,3,10);}
      } else if (game.level===4) {
        if (seed<55){ctx.fillStyle="#182038";ctx.fillRect(t.x+(seed%28)+8,t.y+6,1,10+(seed%8));}
        if (seed%8===0){ctx.fillStyle=`rgba(100,180,255,${0.15+seed%5*0.04})`;ctx.fillRect(t.x+(seed%30)+4,t.y+t.h-6,3,5);}
      } else if (game.level===5) {
        if (seed<65){ctx.fillStyle="#1c0404";ctx.fillRect(t.x+(seed%28)+8,t.y+8,1,10+(seed%8));}
        if (seed%6===0){ctx.fillStyle=`rgba(255,${40+seed%60},0,0.22)`;ctx.fillRect(t.x+(seed%30)+4,t.y+t.h-6,4,4);}
      } else {
        if (seed<65){ctx.fillStyle="#1c0a04";ctx.fillRect(t.x+(seed%28)+8,t.y+8,1,10+(seed%8));}
        if (seed%6===0){ctx.fillStyle=`rgba(255,${40+seed%60},0,0.22)`;ctx.fillRect(t.x+(seed%30)+4,t.y+t.h-6,4,4);}
      }
    }

    const tSet=new Set(game.tiles.map(t=>`${Math.round(t.x/TILE)},${Math.round(t.y/TILE)}`));
    let ti=0;
    for (const t of game.tiles) {
      ti++;
      const col=Math.round(t.x/TILE), row=Math.round(t.y/TILE);
      if (tSet.has(`${col},${row-1}`)) continue;
      if (ti%4!==1) continue;
      const fx=t.x+TILE/2, fy=t.y;
      const fl=Math.sin(game.tick*0.18+col*1.3+row*0.9);
      const fh=7+Math.round(fl*2);
      const fc=fl>0.3?"#ffee44":fl>-0.3?"#ffaa00":"#ff6600";
      ctx.fillStyle="#887766"; ctx.fillRect(fx-3,fy-6,6,6);
      ctx.fillStyle=fc;
      ctx.beginPath();ctx.moveTo(fx,fy-6-fh);ctx.lineTo(fx-4,fy-6);ctx.lineTo(fx+4,fy-6);ctx.closePath();ctx.fill();
      ctx.fillStyle=`rgba(255,200,50,${(0.22+fl*0.08).toFixed(2)})`;
      ctx.beginPath();ctx.arc(fx,fy-8-fh/2,7,0,Math.PI*2);ctx.fill();
    }

    if (game.goal) {
      const flagUnlocked = game.kills >= game.requiredKills;
      if (flagUnlocked) {
        ctx.save(); ctx.filter="blur(10px)"; ctx.globalAlpha=0.5; ctx.fillStyle="#ffdd44";
        ctx.beginPath();ctx.arc(game.goal.x+20,game.goal.y+12,28,0,Math.PI*2);ctx.fill();
        ctx.filter="none"; ctx.globalAlpha=1; ctx.restore();
        ctx.fillStyle="#ffd700"; ctx.fillRect(game.goal.x,game.goal.y,8,game.goal.h);
        const wave=Math.sin(game.tick*0.1)*5;
        ctx.fillStyle="#ff5f7a";
        ctx.beginPath();ctx.moveTo(game.goal.x+8,game.goal.y+4);ctx.quadraticCurveTo(game.goal.x+20+wave,game.goal.y+8,game.goal.x+32+wave,game.goal.y+12);ctx.quadraticCurveTo(game.goal.x+20+wave,game.goal.y+16,game.goal.x+8,game.goal.y+20);ctx.closePath();ctx.fill();
      } else {
        ctx.fillStyle="#555"; ctx.fillRect(game.goal.x,game.goal.y,8,game.goal.h);
        ctx.fillStyle="#444";
        ctx.beginPath();ctx.moveTo(game.goal.x+8,game.goal.y+4);ctx.lineTo(game.goal.x+28,game.goal.y+12);ctx.lineTo(game.goal.x+8,game.goal.y+20);ctx.closePath();ctx.fill();
        ctx.fillStyle="#999"; ctx.font="11px Arial"; ctx.textAlign="center";
        ctx.fillText(game.kills+"/"+game.requiredKills+" kills",game.goal.x+16,game.goal.y-6);
        ctx.textAlign="left";
      }
    }

    for (const pk of game.pickups) {
      const bob=Math.sin(game.tick*0.1+pk.x*0.05)*3;
      ctx.globalAlpha=pk.life<60?pk.life/60:1;
      drawHeart(pk.x, pk.y+bob, 2, true);
      ctx.globalAlpha=1;
    }

    for (const a of game.attacks) { ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fillRect(a.x,a.y,a.w,a.h); }

    // Draw fire patches
    for (const fp of game.firePatches) {
      const fa = fp.life/180;
      ctx.globalAlpha = Math.min(1, fa*2);
      ctx.fillStyle = `rgba(255,${Math.floor(80+Math.random()*80)},0,0.8)`;
      ctx.fillRect(fp.x, fp.y, fp.w, fp.h);
      ctx.fillStyle = `rgba(255,200,50,0.5)`;
      ctx.fillRect(fp.x+4, fp.y, fp.w-8, 3);
    }
    ctx.globalAlpha = 1;
    // Draw elec tiles
    for (const et of game.elecTiles) {
      const ep = et.life/60;
      ctx.fillStyle = `rgba(200,255,100,${(0.5+Math.sin(game.tick*0.5)*0.3)*ep})`;
      ctx.fillRect(et.x, et.y, TILE, TILE);
    }

    function _drawEnemy(e) {
      if (e.type==="boss") drawBoss(e);
      else if (e.type==="nik") drawNik(e);
      else if (e.type==="rok") drawRok(e);
      else if (e.type==="mouse") drawMouseBoss(e);
      else if (e.type==="orangecat") drawOrangeCatBoss(e);
      else if (e.type==="purplecat") drawPurpleCatBoss(e);
      else if (e.type==="goldcat") drawGoldCatBoss(e);
      else if (e.type==="flyer") drawFlyer(e);
      else drawGrunt(e);
    }

    for (const e of game.enemies) {
      if (!e.alive) continue;
      // Draw dormant bosses as faint silhouettes
      if (!e.active && ["boss","mouse","orangecat","purplecat","goldcat","nik","rok"].includes(e.type)) {
        ctx.globalAlpha = 0.25; _drawEnemy(e); ctx.globalAlpha = 1; continue;
      }
      if (e.dying) {
        const s=e.deathTimer/18, ecx=Math.round(e.x+e.w/2), ecy=Math.round(e.y+e.h/2);
        ctx.save();ctx.globalAlpha=s;ctx.translate(ecx,ecy);ctx.scale(s,s);ctx.translate(-ecx,-ecy);
        _drawEnemy(e);
        ctx.restore();ctx.globalAlpha=1;continue;
      }
      _drawEnemy(e);
    }

    // Draw enemy attack hitboxes
    for (const a of game.enemyAttacks) { ctx.fillStyle="rgba(255,150,50,0.4)"; ctx.fillRect(a.x,a.y,a.w,a.h); }

    drawBeni();

    for (const p of game.projectiles) {
      if (p.trail) for (let i=0;i<p.trail.length;i++) { ctx.globalAlpha=(1-i/p.trail.length)*0.45;ctx.fillStyle="#ff6b2c";ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,Math.max(1,p.r*(1-i/p.trail.length)*0.7),0,Math.PI*2);ctx.fill(); }
    }
    ctx.globalAlpha=1;
    ctx.save();ctx.filter="blur(10px)";
    for (const p of game.projectiles) { ctx.globalAlpha=0.65;ctx.fillStyle="#ffaa55";ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.5,0,Math.PI*2);ctx.fill(); }
    ctx.filter="none";ctx.globalAlpha=1;ctx.restore();
    for (const p of game.projectiles) { ctx.fillStyle="#ff6b2c";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill(); ctx.strokeStyle="#ffd28d";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,p.y,p.r+5,p.r-6,0.3,0,Math.PI*2);ctx.stroke(); }

    for (const p of game.enemyProjectiles) {
      if (p.shockwave) continue;
      const tc = p.thunder?"#88eeff":p.fireBolt?"#ff6600":"#c935ff";
      if (p.trail) for (let i=0;i<p.trail.length;i++) { ctx.globalAlpha=(1-i/p.trail.length)*0.45;ctx.fillStyle=tc;ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,Math.max(1,p.r*(1-i/p.trail.length)*0.7),0,Math.PI*2);ctx.fill(); }
    }
    ctx.globalAlpha=1;
    ctx.save();ctx.filter="blur(10px)";
    for (const p of game.enemyProjectiles) { if (p.shockwave) continue; const gc=p.thunder?"#aaffff":p.fireBolt?"#ffaa44":"#ee77ff"; ctx.globalAlpha=0.65;ctx.fillStyle=gc;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.4,0,Math.PI*2);ctx.fill(); }
    ctx.filter="none";ctx.globalAlpha=1;ctx.restore();
    for (const p of game.enemyProjectiles) {
      if (p.shockwave) continue;
      const pc=p.thunder?"#44ddff":p.fireBolt?"#ff4400":"#c935ff";
      const sc=p.thunder?"#ccffff":p.fireBolt?"#ffcc44":"#f7b7ff";
      ctx.fillStyle=pc;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      if (p.thunder) {
        ctx.strokeStyle=sc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x-4,p.y-4);ctx.lineTo(p.x+2,p.y);ctx.lineTo(p.x-2,p.y+4);ctx.stroke();
      } else {
        ctx.strokeStyle=sc;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,p.y,p.r+7,p.r-8,-0.2,0,Math.PI*2);ctx.stroke();
      }
    }
    for (const p of game.enemyProjectiles) {
      if (!p.shockwave) continue;
      const pulse = 0.7 + Math.sin(game.tick * 0.3) * 0.3;
      ctx.save();
      ctx.fillStyle=`rgba(255,${Math.floor(140+Math.random()*60)},0,${(0.8*pulse).toFixed(2)})`;
      ctx.fillRect(p.x-14, p.y-8, 28, 16);
      ctx.fillStyle=`rgba(255,255,180,${(0.6*pulse).toFixed(2)})`;
      ctx.fillRect(p.x-8, p.y-4, 16, 8);
      ctx.restore();
    }

    drawPlayer();

    for (const p of game.particles) { ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.size*(p.life/p.maxLife)),0,Math.PI*2);ctx.fill(); }
    ctx.globalAlpha=1;

    ctx.textAlign="center"; ctx.font="bold 18px Arial";
    for (const p of game.popups) {
      ctx.globalAlpha=p.life/p.maxLife;
      ctx.strokeStyle="rgba(0,0,0,0.6)";ctx.lineWidth=3;ctx.strokeText(p.text,p.x,p.y);
      ctx.fillStyle=p.color;ctx.fillText(p.text,p.x,p.y);
    }
    ctx.globalAlpha=1; ctx.textAlign="left";

    if (game.lightning>0) { ctx.fillStyle=`rgba(200,220,255,${game.lightning/8*0.45})`;ctx.fillRect(0,0,W,H); }

    drawLighting();

    ctx.restore(); // end shake

    // ── HUD ──────────────────────────────────────────────────────────────────
    // HP
    ctx.fillStyle="#00000088"; ctx.fillRect(10,10,106,36);
    for (let i=0;i<3;i++) drawHeart(16+i*34, 16, 3, i<player.hp);

    // Lives
    ctx.fillStyle="#00000088"; ctx.fillRect(10,48,120,22);
    ctx.fillStyle="#ffcccc"; ctx.font="12px Arial"; ctx.fillText("LIVES: ", 16, 63);
    for (let i=0;i<game.lives;i++) drawHeart(56+i*20, 52, 2, true);

    // Score + Kills
    ctx.fillStyle="#00000088"; ctx.fillRect(10,74,160,22);
    ctx.fillStyle="#fff"; ctx.font="13px Arial";
    ctx.fillText("Score: "+game.score, 16, 89);
    ctx.fillText(game.kills+"/"+game.requiredKills, 120, 89);

    // Level
    ctx.fillStyle="#00000066"; ctx.fillRect(10,100,80,20);
    ctx.fillStyle="#aac4ff"; ctx.font="13px Arial";
    ctx.fillText("Level "+(game.level+1), 16, 114);

    // Power bar
    ctx.fillStyle="#00000088"; ctx.fillRect(10,124,104,18);
    ctx.fillStyle="#223"; ctx.fillRect(12,126,100,14);
    ctx.fillStyle=player.power>=100?"#ffd700":"#72ff88";
    ctx.fillRect(12,126,player.power,14);
    if (player.power>=100) { ctx.strokeStyle="#fff";ctx.strokeRect(12,126,100,14); ctx.fillStyle="#fff";ctx.font="11px Arial";ctx.fillText("K / X READY",16,137); }

    // Timer
    const timerSecs = Math.ceil(game.timer/60);
    const timerFlash = game.timer < 600 && game.tick%20 < 10;
    ctx.fillStyle=timerFlash?"rgba(200,0,0,0.85)":"#00000088";
    ctx.fillRect(W/2-46,10,92,24);
    ctx.fillStyle=timerFlash?"#ffaaaa":"#eeeeee";
    ctx.font="bold 16px Arial"; ctx.textAlign="center";
    ctx.fillText("⏱ "+timerSecs, W/2, 27);
    ctx.textAlign="left";

    // Boss health bar (any active boss)
    const activeBoss = game.enemies.find(e=>e.active&&e.alive&&!e.dying&&!["grunt","flyer"].includes(e.type));
    if (activeBoss) {
      const bw=420,bh=16,bx=(W-bw)/2,by=40;
      const bossLabels={boss:"⚔ KLANAC ⚔",nik:"⚡ NIK ⚡",rok:"🔥 ROK 🔥",mouse:"WHITE MOUSE",orangecat:"ORANGE CAT",purplecat:"PURPLE CAT",goldcat:"GOLD CAT"};
      ctx.fillStyle="#000000aa";ctx.fillRect(bx-6,by-4,bw+12,bh+8);
      ctx.fillStyle="#330000";ctx.fillRect(bx,by,bw,bh);
      const hr=activeBoss.hp/activeBoss.maxHp;
      ctx.fillStyle=hr>0.5?"#cc2222":hr>0.25?"#ff5500":"#ff0000";
      ctx.fillRect(bx,by,hr*bw,bh);
      ctx.strokeStyle="#ff6666";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle="#fff";ctx.textAlign="center";ctx.font="bold 11px Arial";
      ctx.fillText(bossLabels[activeBoss.type]||activeBoss.type.toUpperCase(),W/2,by+bh-2);
      ctx.textAlign="left";
    }

    ctx.fillStyle="#00000066";ctx.fillRect(W-130,10,120,18);
    ctx.fillStyle="#aaa";ctx.font="12px Arial";
    ctx.fillText("Best: "+highScore,W-124,23);

    if (game.levelTitle>0) {
      const a=game.levelTitle>90?(120-game.levelTitle)/30:game.levelTitle/90;
      ctx.save();ctx.globalAlpha=a;
      ctx.fillStyle="rgba(0,0,0,0.72)";
      const tw=320,th2=78,tx=(W-tw)/2,ty=(H-th2)/2-20;
      ctx.fillRect(tx,ty,tw,th2);
      ctx.strokeStyle="rgba(100,160,255,0.6)";ctx.lineWidth=2;ctx.strokeRect(tx,ty,tw,th2);
      ctx.fillStyle="#eaf2ff";ctx.textAlign="center";
      ctx.font="bold 34px Arial";ctx.fillText("LEVEL "+(game.level+1),W/2,ty+40);
      ctx.fillStyle="#7aacff";ctx.font="16px Arial";ctx.fillText(LEVEL_NAMES[game.level]||"",W/2,ty+64);
      ctx.textAlign="left";ctx.restore();
    }

    if (game.bossDialogue.timer>0) {
      const bd=game.bossDialogue;
      const chars=Math.min(bd.text.length,Math.floor((bd.maxTimer-bd.timer)/3)+1);
      const visible=bd.text.substring(0,chars);
      const bw=380,bh=54,bx=(W-bw)/2,by=H-80;
      ctx.fillStyle="rgba(0,0,0,0.82)";ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle="#cc2200";ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle="#ff4422";ctx.font="bold 13px Arial";ctx.textAlign="left";
      const _spkLabels={boss:"KLANAC",mouse:"WHITE MOUSE",orangecat:"ORANGE CAT",purplecat:"PURPLE CAT",goldcat:"GOLD CAT",nik:"NIK",rok:"ROK"};
      const _activeSpeaker=game.enemies.find(e=>e.alive&&!e.dying&&["boss","mouse","orangecat","purplecat","goldcat","nik","rok"].includes(e.type));
      ctx.fillText((_activeSpeaker?(_spkLabels[_activeSpeaker.type]||"???"):"KLANAC")+":",bx+12,by+20);
      ctx.fillStyle="#ffffff";ctx.font="15px Arial";
      ctx.fillText(visible,bx+12,by+40);
      ctx.textAlign="left";
    }

    if (game.transition>0) {
      const t=game.transition;
      const progress=t<=32?t/32:Math.max(0,(65-t)/33);
      const half=Math.min(progress*(W/2+4),W/2+2);
      ctx.fillStyle="#000";
      ctx.fillRect(0,0,half,H);ctx.fillRect(W-half,0,half,H);
      if (t>=30&&t<=55) {
        ctx.fillStyle="#fff";ctx.font="bold 40px Arial";ctx.textAlign="center";
        ctx.fillText("LEVEL "+(game.level+1),W/2,H/2-8);
        ctx.fillStyle="#7aacff";ctx.font="18px Arial";
        ctx.fillText(LEVEL_NAMES[game.level]||"",W/2,H/2+22);
        ctx.textAlign="left";
      }
    }
  }

  // ── Post FX ───────────────────────────────────────────────────────────────────
  function drawPostFX() {
    ctx.fillStyle="rgba(0,0,0,0.13)";
    for (let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.88);
    vig.addColorStop(0,"rgba(0,0,0,0)");vig.addColorStop(1,"rgba(0,0,0,0.58)");
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  }

  // ── Menu screen ───────────────────────────────────────────────────────────────
  function drawMenuScreen() {
    ctx.fillStyle="#06060e"; ctx.fillRect(0,0,W,H);
    for (let i=0;i<60;i++) {
      const sx=(i*137+23)%W, sy=(i*89+11)%(H*0.58);
      ctx.globalAlpha=0.3+Math.abs(Math.sin(game.tick*0.04+i*0.7))*0.7;
      ctx.fillStyle="#ffffff"; ctx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle="rgba(255,255,255,0.06)";
    for (let i=0;i<3;i++) {
      const cx=((game.tick*(0.3+i*0.1)+i*320)%(W+200))-100, cy=55+i*38;
      ctx.beginPath();ctx.ellipse(cx,cy,65+i*18,18,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+42,cy-10,40,13,0,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle="#0d1624";
    ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H*.5);ctx.lineTo(60,H*.28);ctx.lineTo(140,H*.44);ctx.lineTo(240,H*.18);ctx.lineTo(340,H*.36);ctx.lineTo(440,H*.22);ctx.lineTo(540,H*.42);ctx.lineTo(640,H*.15);ctx.lineTo(740,H*.38);ctx.lineTo(840,H*.24);ctx.lineTo(960,H*.4);ctx.lineTo(W,H);ctx.fill();
    ctx.fillStyle="rgba(0,0,0,0.12)"; for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
    vig.addColorStop(0,"rgba(0,0,0,0)");vig.addColorStop(1,"rgba(0,0,0,0.7)");
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor="#4466ff"; ctx.shadowBlur=16+Math.sin(game.tick*0.06)*8;
    ctx.fillStyle="#eaf2ff"; ctx.textAlign="center";
    ctx.font="bold 72px Arial"; ctx.fillText("BENGO",W/2,H/2-50);
    ctx.restore();
    ctx.fillStyle="#7aacff"; ctx.textAlign="center";
    ctx.font="18px Arial"; ctx.fillText("Phaser Edition",W/2,H/2+2);
    ctx.font="22px Arial"; ctx.fillText("Retro Platformer Adventure",W/2,H/2+30);
    ctx.fillStyle="#eaf2ff"; ctx.font="16px Arial"; ctx.fillText("Tap or press Enter to play",W/2,H/2+60);
    if (highScore>0) { ctx.fillStyle="#ffd700";ctx.font="14px Arial";ctx.fillText("Best: "+highScore,W/2,H/2+88); }
    ctx.textAlign="left";
  }

  // ── Static screen (gameover / win) ────────────────────────────────────────────
  function drawStaticScreen(title, subtitle) {
    ctx.fillStyle="#06060e"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(0,0,0,0.12)"; for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
    vig.addColorStop(0,"rgba(0,0,0,0)");vig.addColorStop(1,"rgba(0,0,0,0.7)");
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#eaf2ff"; ctx.textAlign="center";
    ctx.font="bold 62px Arial"; ctx.fillText(title,W/2,H/2-40);
    ctx.font="22px Arial"; ctx.fillText(subtitle,W/2,H/2+14);
    ctx.fillStyle="#7aacff"; ctx.font="16px Arial"; ctx.fillText("Tap or press Enter to play again",W/2,H/2+56);
    if (highScore>0) { ctx.fillStyle="#ffd700";ctx.font="14px Arial";ctx.fillText("Best score: "+highScore,W/2,H/2+86); }
    ctx.textAlign="left";
  }

  // ── Pause overlay ─────────────────────────────────────────────────────────────
  function drawPauseOverlay() {
    ctx.fillStyle="rgba(0,0,0,0.58)"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#eaf2ff"; ctx.textAlign="center";
    ctx.font="bold 56px Arial"; ctx.fillText("PAUSED",W/2,H/2-10);
    ctx.fillStyle="#7aacff"; ctx.font="18px Arial"; ctx.fillText("Press P or Enter to resume",W/2,H/2+34);
    const vbx=W/2-100, vby=H/2+68, vbw=200, vbh=18;
    ctx.fillStyle="#00000088"; ctx.fillRect(vbx-2,vby-22,vbw+4,52);
    ctx.fillStyle="#7aacff"; ctx.font="14px Arial"; ctx.fillText("◄  Volume  ►",W/2,vby-6);
    ctx.fillStyle="#223"; ctx.fillRect(vbx,vby,vbw,vbh);
    ctx.fillStyle="#ff6600"; ctx.fillRect(vbx,vby,vbw*game.volume,vbh);
    ctx.strokeStyle="#aac4ff"; ctx.lineWidth=1; ctx.strokeRect(vbx,vby,vbw,vbh);
    ctx.fillStyle="#fff"; ctx.font="12px Arial"; ctx.fillText(Math.round(game.volume*100)+"%",W/2,vby+vbh+14);
    ctx.textAlign="left";
  }

  // ── Phaser Scenes ─────────────────────────────────────────────────────────────

  class BootScene extends Phaser.Scene {
    constructor() { super("Boot"); }
    preload() {
      // SWAP: add asset loading here to use real sprites instead of drawn ones
      // e.g. this.load.spritesheet("player", "assets/player.png", { frameWidth: 30, frameHeight: 48 })
      // e.g. this.load.image("tile0", "assets/tile_forest.png")
    }
    create() {
      ctx = canvas.getContext("2d");
      this.scene.start("Menu");
    }
  }

  class MenuScene extends Phaser.Scene {
    constructor() { super("Menu"); }
    create() {
      game.state = "menu";
      this._onRender = () => {
        if (!this.scene.isActive("Menu")) return;
        drawMenuScreen();
        drawPostFX();
      };
      this.game.events.on("postrender", this._onRender);
    }
    update() { game.tick++; }
    shutdown() { this.game.events.off("postrender", this._onRender); }
  }

  class GameScene extends Phaser.Scene {
    constructor() { super("Game"); }
    create() {
      this._onRender = () => {
        if (!this.scene.isActive("Game")) return;
        if (game.state === "playing" || game.state === "paused") {
          drawWorld();
          if (game.state === "paused") drawPauseOverlay();
        } else if (game.state === "gameover") {
          drawStaticScreen("GAME OVER", "Score: "+game.score+"  •  Level "+(game.level+1));
        } else if (game.state === "win") {
          drawStaticScreen("YOU WIN!", "Final Score: "+game.score);
        }
        if (flash > 0) { ctx.fillStyle="rgba(255,255,255,0.22)"; ctx.fillRect(0,0,W,H); flash--; }
        drawPostFX();
      };
      this.game.events.on("postrender", this._onRender);
    }
    update() {
      game.tick++;
      if (game.state === "playing") {
        if (game.hitStop > 0) { game.hitStop--; }
        else { updateGame(); }
      }
    }
    shutdown() {
      this.game.events.off("postrender", this._onRender);
      stopMusic();
    }
  }

  // ── Game start helper ─────────────────────────────────────────────────────────
  function _doStartGame(lvl) {
    if (audio.state === "suspended") audio.resume();
    game.state = "playing"; game.level = lvl; game.score = 0;
    game.lives = 3;
    player.hp = 3; player.power = 0;
    loadLevel(lvl);
  }

  // ── Controls ──────────────────────────────────────────────────────────────────
  function bindBtn(id, key) {
    const btn = document.getElementById(id); if (!btn) return;
    btn.addEventListener("touchstart", e=>{e.preventDefault();keys[key]=true;},{passive:false});
    btn.addEventListener("touchend",   e=>{e.preventDefault();keys[key]=false;},{passive:false});
    btn.addEventListener("touchcancel", ()=>{keys[key]=false;});
  }
  bindBtn("btn-left","arrowleft"); bindBtn("btn-right","arrowright");
  bindBtn("btn-jump","arrowup"); bindBtn("btn-jump-left","q"); bindBtn("btn-jump-right","e");
  bindBtn("btn-sword","j"); bindBtn("btn-power","k");

  canvas.addEventListener("touchstart", e => {
    if (audio.state === "suspended") audio.resume();
    if (game.state === "menu") {
      e.preventDefault();
      _doStartGame(0);
      if (phaserGame) phaserGame.scene.stop("Menu"), phaserGame.scene.start("Game");
    } else if (game.state === "gameover" || game.state === "win") {
      e.preventDefault();
      _doStartGame(0);
    }
  }, {passive:false});

  window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    if (audio.state === "suspended") audio.resume();

    if (e.key.toLowerCase() === "l") {
      _doStartGame(6);
      if (phaserGame && !phaserGame.scene.isActive("Game")) {
        phaserGame.scene.stop("Menu"); phaserGame.scene.start("Game");
      }
    }
    if (e.key.toLowerCase() === "p") {
      if (game.state === "playing")  { game.state = "paused"; stopMusic(); }
      else if (game.state === "paused") { game.state = "playing"; startMusic(); }
    }
    if (game.state === "paused") {
      if (e.key === "ArrowLeft")  { game.volume=Math.max(0,+(game.volume-0.1).toFixed(1)); masterGain.gain.value=game.volume; }
      if (e.key === "ArrowRight") { game.volume=Math.min(1,+(game.volume+0.1).toFixed(1)); masterGain.gain.value=game.volume; }
    }
    if (e.key === "Enter") {
      if (game.state === "menu") {
        _doStartGame(0);
        if (phaserGame) phaserGame.scene.stop("Menu"), phaserGame.scene.start("Game");
      } else if (game.state === "gameover" || game.state === "win") {
        _doStartGame(0);
      } else if (game.state === "paused") {
        game.state = "playing"; startMusic();
      }
    }
  });

  window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
    if (["w","arrowup","q","e"].includes(e.key.toLowerCase())) {
      if (player.vy < -4) player.vy *= 0.45;
    }
  });

  // ── Phaser init ───────────────────────────────────────────────────────────────
  let phaserGame;
  const phaserConfig = {
    type: Phaser.CANVAS,
    canvas: canvas,
    width: W,
    height: H,
    clearBeforeRender: true,
    backgroundColor: "#06060e",
    disableContextMenu: true,
    input: { keyboard: false, mouse: false, touch: false }, // we handle input ourselves
    scene: [BootScene, MenuScene, GameScene]
  };
  phaserGame = new Phaser.Game(phaserConfig);
  </script>
</body>
</html>
